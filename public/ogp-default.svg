<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="navy-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1A2940"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#navy-bg)"/>

  <!-- Subtle dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#C9A961" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Gold top border -->
  <rect x="0" y="0" width="1200" height="4" fill="#C9A961"/>

  <!-- Left decorative column -->
  <rect x="60" y="80" width="4" height="470" fill="#C9A961" opacity="0.3"/>

  <!-- Document graphic - right side -->
  <g transform="translate(820, 80)">
    <!-- Back pages -->
    <rect x="60" y="20" width="260" height="340" rx="8" fill="#C9A961" opacity="0.08"/>
    <rect x="30" y="10" width="260" height="340" rx="8" fill="#C9A961" opacity="0.12"/>
    <!-- Front page -->
    <rect x="0" y="0" width="260" height="340" rx="8" fill="#fff" opacity="0.06"/>
    <rect x="0" y="0" width="260" height="340" rx="8" fill="none" stroke="#C9A961" stroke-width="1.5" opacity="0.4"/>
    <!-- Gold header bar -->
    <rect x="0" y="0" width="260" height="12" rx="8" fill="#C9A961" opacity="0.6"/>
    <!-- Lines -->
    <rect x="24" y="40" width="180" height="8" rx="4" fill="#fff" opacity="0.12"/>
    <rect x="24" y="60" width="140" height="6" rx="3" fill="#fff" opacity="0.08"/>
    <rect x="24" y="90" width="200" height="5" rx="2.5" fill="#fff" opacity="0.07"/>
    <rect x="24" y="104" width="170" height="5" rx="2.5" fill="#fff" opacity="0.07"/>
    <rect x="24" y="118" width="190" height="5" rx="2.5" fill="#fff" opacity="0.07"/>
    <rect x="24" y="132" width="155" height="5" rx="2.5" fill="#fff" opacity="0.07"/>
    <rect x="24" y="160" width="200" height="5" rx="2.5" fill="#fff" opacity="0.06"/>
    <rect x="24" y="174" width="165" height="5" rx="2.5" fill="#fff" opacity="0.06"/>
    <!-- Stamp circle -->
    <circle cx="194" cy="290" r="36" fill="none" stroke="#C9A961" stroke-width="1.5" opacity="0.5"/>
    <text x="194" y="295" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#C9A961" text-anchor="middle" opacity="0.6">FREE DL</text>
  </g>

  <!-- Main eyebrow -->
  <text x="84" y="160" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" fill="#C9A961" letter-spacing="5">BUSINESS DOCUMENT TEMPLATES</text>

  <!-- Main headline -->
  <text x="84" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="700" fill="#FFFFFF">会員登録、</text>
  <text x="84" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="700" fill="#C9A961" x="84" y="270">
    <tspan dx="680">もう要らない。</tspan>
  </text>

  <!-- Rewrite as two lines -->
  <text x="84" y="240" font-family="'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif" font-size="76" font-weight="700" fill="#FFFFFF">会員登録、もう要らない。</text>
  <text x="84" y="340" font-family="'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif" font-size="76" font-weight="700" fill="#C9A961">業務テンプレ、3秒でDL。</text>

  <!-- Separator line -->
  <rect x="84" y="380" width="640" height="1" fill="#C9A961" opacity="0.3"/>

  <!-- Sub copy -->
  <text x="84" y="420" font-family="'Hiragino Sans', system-ui, sans-serif" font-size="24" fill="#8A94A6">退職届・契約書・請求書 — Word / Excel / Googleドキュメント対応</text>

  <!-- Metrics -->
  <text x="84" y="510" font-family="Georgia, serif" font-size="48" font-weight="700" fill="#C9A961">40+</text>
  <text x="84" y="540" font-family="system-ui, sans-serif" font-size="16" fill="#5A6478">テンプレート</text>

  <text x="240" y="510" font-family="Georgia, serif" font-size="48" font-weight="700" fill="#C9A961">3</text>
  <text x="240" y="540" font-family="system-ui, sans-serif" font-size="16" fill="#5A6478">ファイル形式</text>

  <text x="360" y="510" font-family="Georgia, serif" font-size="48" font-weight="700" fill="#C9A961">0円</text>
  <text x="360" y="540" font-family="system-ui, sans-serif" font-size="16" fill="#5A6478">完全無料</text>

  <!-- Logo area -->
  <rect x="84" y="568" width="1032" height="1" fill="#C9A961" opacity="0.15"/>
  <text x="84" y="600" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#C9A961" opacity="0.8">テンプレートフリー</text>
  <text x="84" y="620" font-family="system-ui, sans-serif" font-size="14" fill="#5A6478">template-free.jp</text>
</svg>
